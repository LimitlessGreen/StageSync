syntax = "proto3";

package stagesync.v1;

import "stagesync/v1/common.proto";
import "stagesync/v1/node.proto";
import "google/protobuf/empty.proto";

option go_package = "stagesync-server/gen/go/stagesync/v1;stagesyncv1";

// ── Show Control Service ──────────────────────────────────────────────────────

service ShowControlService {
  // Aktuelle CueList abrufen
  rpc GetCueList(GetCueListRequest) returns (CueListResponse);

  // CueList ersetzen (Master/Editor-Role erforderlich)
  rpc UpdateCueList(UpdateCueListRequest) returns (CueListResponse);

  // Eine einzelne Cue hinzufügen / aktualisieren
  rpc UpsertCue(UpsertCueRequest) returns (CueResponse);

  // Eine Cue löschen
  rpc DeleteCue(DeleteCueRequest) returns (google.protobuf.Empty);

  // GO — nächste Cue oder spezifische Cue ausführen
  rpc Go(GoRequest) returns (GoResponse);

  // STOP — alle laufenden Cues stoppen
  rpc Stop(StopRequest) returns (google.protobuf.Empty);

  // PAUSE / RESUME
  rpc Pause(PauseRequest) returns (google.protobuf.Empty);
  rpc Resume(ResumeRequest) returns (google.protobuf.Empty);

  // ── 4-Stream EventBus ────────────────────────────────────────────────────
  // Stream 1: Show-Definition (CueList, Patch, Assets)
  rpc WatchShowDefinition(WatchShowDefinitionRequest) returns (stream ShowDefinitionEvent);

  // Stream 2: Show-Execution (Transport, Cue-States)
  rpc WatchShowExecution(WatchShowExecutionRequest) returns (stream ShowExecutionEvent);

  // Stream 3: Node Health (Online/Offline, Clock-Delta)
  rpc WatchNodeHealth(WatchNodeHealthRequest) returns (stream NodeHealthEvent);

  // Stream 4: Media Sync (Asset-Änderungen)
  rpc WatchMediaSync(WatchMediaSyncRequest) returns (stream MediaSyncEvent);
}

// ── Cue Data Model ────────────────────────────────────────────────────────────

message Cue {
  string   cue_id     = 1;
  string   number     = 2; // Anzeigenummer z.B. "1", "1.5", "10A"
  string   label      = 3;
  CueType  cue_type   = 4;
  CueState state      = 5;

  // Welcher Node führt diese Cue aus
  string   target_node_id   = 6;
  // Leer = nächste Cue automatisch, sonst wartet die Engine auf GO
  bool     auto_continue    = 7;
  double   pre_wait_ms      = 8;
  double   post_wait_ms     = 9;

  // Type-spezifische Parameter (oneof)
  oneof params {
    AudioCueParams  audio  = 10;
    MaOscCueParams  ma_osc = 11;
    WaitCueParams   wait   = 12;
    GotoCueParams   goto_p = 13;
    GroupCueParams  group  = 17;
  }

  Timestamp created_at  = 14;
  Timestamp updated_at  = 15;
  int64     version     = 16; // CRDT-Version für Sync
}

message AudioCueParams {
  string  file_path      = 1; // deprecated: basename-Pfad (Migrations-Fallback)
  double  volume_db      = 2; // 0.0 = unity, negative = Dämpfung
  double  fade_in_ms     = 3;
  double  fade_out_ms    = 4;
  bool    loop           = 5;
  double  start_time_ms  = 6;
  double  end_time_ms    = 7; // 0 = bis Ende
  string  output_device  = 8; // leer = System-Default
  string  asset_id       = 9; // SHA-256 des Assets (bevorzugt gegenüber file_path)
}

message MaOscCueParams {
  string  osc_address    = 1;
  string  osc_argument   = 2;
  int32   executor_page  = 3;
  int32   executor_no    = 4;
  enum MaCommand {
    MA_CMD_UNSPECIFIED = 0;
    MA_CMD_GO          = 1;
    MA_CMD_OFF         = 2;
    MA_CMD_PAUSE       = 3;
    MA_CMD_GOTO        = 4;
  }
  MaCommand command      = 5;
  int32   goto_cue       = 6;
}

message WaitCueParams {
  double duration_ms = 1;
}

message GotoCueParams {
  string target_cue_id = 1;
  string target_number = 2;
}

message GroupCueParams {
  repeated string child_cue_ids = 1;
  bool sequential               = 2;
}

// ── CueList ───────────────────────────────────────────────────────────────────

message CueList {
  string         cue_list_id   = 1;
  string         name          = 2;
  repeated Cue   cues          = 3;
  string         active_cue_id = 4;
  string         next_cue_id   = 5;
  int64          version       = 6;
  Timestamp      updated_at    = 7;
}

// ── Request/Response ──────────────────────────────────────────────────────────

message GetCueListRequest {
  string session_id   = 1;
  string token        = 2;
  string cue_list_id  = 3;
}

message UpdateCueListRequest {
  string  session_id  = 1;
  string  token       = 2;
  CueList cue_list    = 3;
}

message CueListResponse {
  CueList cue_list = 1;
}

message UpsertCueRequest {
  string session_id   = 1;
  string token        = 2;
  string cue_list_id  = 3;
  Cue    cue          = 4;
}

message CueResponse {
  Cue cue = 1;
}

message DeleteCueRequest {
  string session_id  = 1;
  string token       = 2;
  string cue_list_id = 3;
  string cue_id      = 4;
}

message GoRequest {
  string session_id  = 1;
  string token       = 2;
  string cue_id      = 3;
  string command_id  = 4; // UUID — Server dedupliziert für 60 s
}

message GoResponse {
  Cue    executing_cue = 1;
  Cue    next_cue      = 2;
}

message StopRequest {
  string session_id = 1;
  string token      = 2;
  string command_id = 3;
}

message PauseRequest {
  string session_id = 1;
  string token      = 2;
  string command_id = 3;
}

message ResumeRequest {
  string session_id = 1;
  string token      = 2;
  string command_id = 3;
}

// ── Stream 1: Show-Definition ─────────────────────────────────────────────────

message WatchShowDefinitionRequest {
  string session_id = 1;
  string node_id    = 2;
  string token      = 3;
}

message ShowDefinitionEvent {
  int64   seq         = 1;
  DefinitionEventType type = 2;
  Timestamp occurred_at    = 3;

  enum DefinitionEventType {
    DEFINITION_SNAPSHOT = 0; // vollständiger State beim Stream-Start
    CUE_LIST_CHANGED    = 1;
  }

  CueList cue_list = 10;
}

// ── Stream 2: Show-Execution ──────────────────────────────────────────────────

message WatchShowExecutionRequest {
  string session_id = 1;
  string node_id    = 2;
  string token      = 3;
}

message ShowExecutionEvent {
  int64   seq              = 1;
  ExecutionEventType type  = 2;
  Timestamp occurred_at   = 3;

  enum ExecutionEventType {
    EXECUTION_SNAPSHOT = 0; // vollständiger Transport-State beim Stream-Start
    CUE_STARTED        = 1;
    CUE_PAUSED         = 2;
    CUE_RESUMED        = 3;
    CUE_STOPPED        = 4;
    CUE_DONE           = 5;
    CUE_ERROR          = 6;
  }

  Cue             affected_cue      = 10;
  string          node_id           = 11;
  string          error_msg         = 12;
  // Explizite Startzeit der aktiven Cue in Server-Unix-Millis.
  // Clients nutzen diesen Wert + ClockSync für korrekte Elapsed-Berechnung.
  int64           cue_started_at_ms = 13;
  bool            is_paused         = 14;
  // IDs aller gleichzeitig laufenden Cues (parallele Group-Children).
  repeated string running_cue_ids   = 15;
}

// ── Stream 3: Node Health ─────────────────────────────────────────────────────

message WatchNodeHealthRequest {
  string session_id = 1;
  string node_id    = 2;
  string token      = 3;
}

message NodeHealthEvent {
  int64   seq             = 1;
  HealthEventType type    = 2;
  Timestamp occurred_at  = 3;

  enum HealthEventType {
    HEALTH_SNAPSHOT  = 0; // vollständiger Node-State beim Stream-Start
    NODE_ONLINE      = 1;
    NODE_OFFLINE     = 2;
    NODE_DEGRADED    = 3;
    CLOCK_DELTA      = 4;
  }

  NodeInfo         node           = 10;
  int64            clock_delta_ms = 11;
  NodeCapabilities capabilities   = 12; // gesetzt bei HEALTH_SNAPSHOT + NODE_ONLINE
}

// ── Stream 4: Media Sync ──────────────────────────────────────────────────────

message WatchMediaSyncRequest {
  string session_id = 1;
  string node_id    = 2;
  string token      = 3;
  string show_id    = 4;
}

message MediaSyncEvent {
  int64   seq            = 1;
  MediaEventType type    = 2;
  Timestamp occurred_at = 3;

  enum MediaEventType {
    MEDIA_SNAPSHOT = 0; // vollständiges Asset-Manifest beim Stream-Start
    ASSET_ADDED    = 1;
    ASSET_REMOVED  = 2;
    ASSET_UPDATED  = 3;
  }

  // Asset-Informationen (für ASSET_ADDED/REMOVED/UPDATED)
  string asset_id   = 10;
  string asset_name = 11;
  string sha256     = 12;
  int64  size_bytes = 13;
}
