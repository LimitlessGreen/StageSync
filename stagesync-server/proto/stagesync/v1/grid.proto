syntax = "proto3";

package stagesync.v1;

import "stagesync/v1/common.proto";
import "stagesync/v1/bus.proto";
import "google/protobuf/empty.proto";

option go_package = "stagesync-server/gen/go/stagesync/v1;stagesyncv1";

// ── Grid / Matrix Service ─────────────────────────────────────────────────────
// Session-View / Clip-Launcher (Ableton-/Playtime-Stil), additiv neben dem
// linearen ShowControl-CueSystem. Zellen ("Clips") werden nicht-linear per
// Klick, OSC oder MIDI (Akai APC Mini) ausgelöst.

service GridService {
  // ── Definition (Editor) ──────────────────────────────────────────────────
  rpc GetGrid(GetGridRequest) returns (GridResponse);
  rpc UpdateGrid(UpdateGridRequest) returns (GridResponse);   // ganzes Grid ersetzen
  rpc UpsertClip(UpsertClipRequest) returns (ClipResponse);   // eine Zelle setzen
  rpc DeleteClip(DeleteClipRequest) returns (google.protobuf.Empty);

  // ── Execution (Transport) ────────────────────────────────────────────────
  rpc LaunchClip(LaunchClipRequest) returns (google.protobuf.Empty);
  rpc LaunchScene(LaunchSceneRequest) returns (google.protobuf.Empty);
  rpc StopTrack(StopTrackRequest) returns (google.protobuf.Empty);
  rpc StopAll(StopAllRequest) returns (google.protobuf.Empty);

  // ── Streams ──────────────────────────────────────────────────────────────
  rpc WatchGridExecution(WatchGridExecRequest) returns (stream GridExecutionEvent);
  rpc GetWaveform(WaveformRequest) returns (stream WaveformChunk);
}

// ── Daten-Modell ──────────────────────────────────────────────────────────────

enum LaunchMode {
  LAUNCH_TRIGGER = 0; // One-Shot beim Antippen (default)
  LAUNCH_GATE    = 1; // läuft nur solange gehalten
  LAUNCH_TOGGLE  = 2; // erneutes Antippen stoppt
}

enum FollowAction {
  FOLLOW_NONE       = 0;
  FOLLOW_NEXT_CLIP  = 1; // nächster Clip im selben Track
  FOLLOW_NEXT_SCENE = 2; // ganze nächste Scene starten
  FOLLOW_STOP       = 3; // Track nach Ende stoppen
}

enum GridQuantize {
  QUANTIZE_OFF = 0; // sofort starten (default)
  QUANTIZE_ON  = 1; // Hook für spätere Beat-/Bar-Quantisierung
}

message Grid {
  string             grid_id  = 1;
  string             name     = 2;
  repeated GridTrack tracks   = 3; // Spalten
  repeated GridScene scenes   = 4; // Reihen (nur Metadaten)
  repeated GridClip  clips    = 5; // dünn besetzt
  GridQuantize       quantize = 6;
  int64              version  = 7;
}

// Spalte: gruppiert auf einen Audio-Bus, optional exklusiv (nur 1 Clip live).
message GridTrack {
  string            track_id  = 1;
  string            name      = 2;
  string            color_hex = 3;
  repeated BusSend  bus_sends = 4; // wiederverwendet aus bus.proto
  bool              exclusive = 5; // default true
}

// Reihe: rein deklarativ; LaunchScene löst alle Clips der Reihe aus.
message GridScene {
  string scene_id  = 1;
  string name      = 2;
  string color_hex = 3;
}

message GridClip {
  string       clip_id     = 1;
  int32        track_index = 2;
  int32        scene_index = 3;
  string       label       = 4;
  string       color_hex   = 5;
  LaunchMode   launch_mode = 6;
  FollowAction follow      = 7;

  oneof payload {
    AudioClipPayload audio   = 10;
    OscClipPayload   osc     = 11;
    MidiClipPayload  midi    = 12;
    CueRefPayload    cue_ref = 13;
  }
}

message AudioClipPayload {
  string asset_id      = 1; // SHA-256 des Assets
  double volume_db     = 2;
  double fade_in_ms    = 3;
  double fade_out_ms   = 4;
  bool   loop          = 5;
  double start_time_ms = 6;
  double end_time_ms   = 7; // 0 = bis Ende
  double declared_duration_ms = 8; // aus Asset-Metadaten; 0 = unbekannt
}

message OscClipPayload {
  string          address        = 1;
  repeated string args           = 2;
  string          target_node_id = 3; // leer = task-basiert (MA_OSC)
}

message MidiClipPayload {
  int32 channel = 1;
  int32 command = 2; // 0x90 Note-On, 0xB0 CC, ...
  int32 data1   = 3;
  int32 data2   = 4;
}

message CueRefPayload {
  string cue_list_id = 1;
  string cue_id      = 2;
}

// ── Request / Response ────────────────────────────────────────────────────────

message GetGridRequest    { string session_id = 1; string token = 2; string grid_id = 3; }
message GridResponse      { Grid grid = 1; }
message UpdateGridRequest { string session_id = 1; string token = 2; Grid grid = 3; }

message UpsertClipRequest {
  string   session_id = 1;
  string   token      = 2;
  string   grid_id    = 3;
  GridClip clip       = 4;
}
message ClipResponse { GridClip clip = 1; }

message DeleteClipRequest {
  string session_id = 1;
  string token      = 2;
  string grid_id    = 3;
  string clip_id    = 4;
}

message LaunchClipRequest {
  string session_id  = 1;
  string token       = 2;
  string grid_id     = 3;
  int32  track_index = 4;
  int32  scene_index = 5;
  string command_id  = 6; // UUID — Server dedupliziert
  bool   released    = 7; // für LAUNCH_GATE: true = Pad losgelassen
}

message LaunchSceneRequest {
  string session_id  = 1;
  string token       = 2;
  string grid_id     = 3;
  int32  scene_index = 4;
  string command_id  = 5;
}

message StopTrackRequest {
  string session_id  = 1;
  string token       = 2;
  string grid_id     = 3;
  int32  track_index = 4;
  string command_id  = 5;
}

message StopAllRequest {
  string session_id = 1;
  string token      = 2;
  string grid_id    = 3;
  string command_id = 4;
}

// ── Stream: Grid-Execution (treibt UI + LED-Feedback) ─────────────────────────

message WatchGridExecRequest {
  string session_id = 1;
  string node_id    = 2;
  string token      = 3;
  string grid_id    = 4;
}

message GridExecutionEvent {
  int64 seq = 1;

  enum Type {
    GRID_SNAPSHOT = 0; // vollständiger State beim Stream-Start
    CLIP_LAUNCHED = 1; // ausgelöst (preload/scheduling)
    CLIP_PLAYING  = 2; // läuft
    CLIP_STOPPED  = 3; // manuell/exklusiv gestoppt
    CLIP_DONE     = 4; // natürlich beendet
    CLIP_ERROR    = 5;
  }
  Type      type           = 2;
  Timestamp occurred_at    = 3;
  string    clip_id        = 10;
  int32     track_index    = 11;
  int32     scene_index    = 12;
  int64     started_at_ms  = 13; // Server-Unix-Millis (ClockSync wie ShowControl)
  double    clip_length_ms = 14;
  string    error_msg      = 15;

  // Bei GRID_SNAPSHOT: alle aktuell laufenden Clip-IDs.
  repeated string running_clip_ids = 16;
}

// ── Stream: Waveform-Peaks ────────────────────────────────────────────────────

message WaveformRequest {
  string session_id = 1;
  string token      = 2;
  string asset_id   = 3;
  int32  buckets    = 4; // gewünschte Auflösung (Anzahl min/max-Paare)
}

message WaveformChunk {
  // Interleaved min/max als int16 (little-endian): [min0, max0, min1, max1, ...].
  bytes data           = 1;
  int32 total_buckets  = 2; // Gesamtzahl der Buckets (in erstem Chunk gesetzt)
  uint32 channels      = 3;
  uint32 sample_rate   = 4;
  double duration_ms   = 5;
}
