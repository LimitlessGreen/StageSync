version: "2"

run:
  timeout: 5m
  # cmd/corelib uses CGo (import "C") which golangci-lint cannot analyse
  # in a pure-Go environment. Exclude it from all linters.
  exclude-dirs:
    - cmd/corelib

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
