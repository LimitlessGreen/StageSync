version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  exclusions:
    # cmd/corelib uses CGo (import "C") which golangci-lint cannot analyse
    paths:
      - cmd/corelib
    rules:
      - path: _test\.go
        linters:
          - errcheck
