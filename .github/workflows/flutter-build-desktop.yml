name: Flutter Desktop & iOS Builds

on:
  push:
    branches: [main]
    paths:
      - 'theatre_companion_app/**'
      - '.github/workflows/flutter-**.yml'
  pull_request:
    branches: [main]
    paths:
      - 'theatre_companion_app/**'
      - '.github/workflows/flutter-**.yml'

concurrency:
  group: flutter-desktop-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: theatre_companion_app
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macOS
            runner: macos-latest
            build_cmd: flutter build macos --release
            artifact_path: theatre_companion_app/build/macos/Build/Products/Release/

          - target: iOS
            runner: macos-latest
            build_cmd: flutter build ios --release --no-codesign
            artifact_path: theatre_companion_app/build/ios/iphoneos/

          - target: Windows
            runner: windows-latest
            build_cmd: flutter build windows --release
            artifact_path: theatre_companion_app/build/windows/x64/runner/Release/

          - target: Linux
            runner: ubuntu-latest
            build_cmd: flutter build linux --release
            artifact_path: theatre_companion_app/build/linux/x64/release/bundle/

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Install Linux dependencies
        if: matrix.target == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev \
            liblzma-dev libstdc++-12-dev cmake clang pkg-config \
            libbluetooth-dev

      - name: Get dependencies
        run: flutter pub get

      - name: ${{ matrix.build_cmd }}
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-release
          path: ${{ matrix.artifact_path }}
          retention-days: 14
