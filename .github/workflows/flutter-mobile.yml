name: Flutter Mobile Builds

on:
  push:
    branches: [main]
    paths:
      - 'theatre_companion_app/**'
      - '.github/workflows/flutter-**.yml'
  pull_request:
    paths:
      - 'theatre_companion_app/**'
      - '.github/workflows/flutter-**.yml'

concurrency:
  group: flutter-mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: theatre_companion_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: theatre_companion_app/build/ios/iphoneos/
          retention-days: 14
