name: Release

# Required secrets for macOS signing (optional — unsigned build if not set):
#   APPLE_CERTIFICATE          Base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD Password for the .p12 export
#   APPLE_SIGNING_IDENTITY     "Developer ID Application: Name (TEAMID)"
#   APPLE_TEAM_ID              10-char Apple Team ID
#   APPLE_ID                   Apple ID email for notarization
#   APPLE_APP_PASSWORD         App-specific password (appleid.apple.com)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.9'
  GO_VERSION: '1.25'

jobs:
  # ── Windows Installer (NSIS) ─────────────────────────────────────────────────
  windows:
    name: Windows Installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Build core library (Windows DLL)
        working-directory: stagesync-server
        shell: pwsh
        env:
          CGO_ENABLED: '1'
        run: |
          go build -buildmode=c-shared -ldflags="-s -w" `
            -o "..\theatre_companion_app\build\windows\x64\runner\Release\stagesync_core.dll" `
            .\cmd\corelib\

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.ref_name }}" -ne "") { "${{ github.ref_name }}" } else { "${{ inputs.tag }}" }
          $ver = $tag -replace '^v', ''
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "VER=$ver" >> $env:GITHUB_OUTPUT

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Write NSIS script
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VER }}"
          $src = (Resolve-Path "build\windows\x64\runner\Release").Path
          $srcNsis = $src.Replace('\','/')
          $outFile = "StageSync-${ver}-windows-x64-setup.exe"
          $nsi = @"
          !define APP_NAME    "StageSync"
          !define APP_VERSION "${ver}"
          !define INSTALL_DIR "`$PROGRAMFILES64\StageSync"
          !define SRC_DIR     "${srcNsis}"

          Unicode true
          Name              "`${APP_NAME} `${APP_VERSION}"
          OutFile           "${outFile}"
          InstallDir        "`${INSTALL_DIR}"
          InstallDirRegKey  HKLM "Software\StageSync" "Install_Dir"
          RequestExecutionLevel admin
          SetCompressor     zlib

          !include "MUI2.nsh"
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"
          !insertmacro MUI_LANGUAGE "German"

          Section "StageSync" SecMain
            SetOutPath "`$INSTDIR"
            File /r "`${SRC_DIR}\*.*"
            WriteRegStr HKLM "Software\StageSync" "Install_Dir" "`$INSTDIR"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\StageSync" "DisplayName" "StageSync"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\StageSync" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\StageSync" "DisplayVersion" "`${APP_VERSION}"
            WriteUninstaller "`$INSTDIR\uninstall.exe"
            CreateDirectory "`$SMPROGRAMS\StageSync"
            CreateShortcut "`$SMPROGRAMS\StageSync\StageSync.lnk" "`$INSTDIR\theatre_companion_app.exe"
            CreateShortcut "`$DESKTOP\StageSync.lnk" "`$INSTDIR\theatre_companion_app.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$SMPROGRAMS\StageSync\StageSync.lnk"
            RMDir "`$SMPROGRAMS\StageSync"
            Delete "`$DESKTOP\StageSync.lnk"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\StageSync"
            DeleteRegKey HKLM "Software\StageSync"
          SectionEnd
          "@
          $nsi | Out-File -FilePath installer.nsi -Encoding UTF8

      - name: Run NSIS
        shell: pwsh
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-windows-x64-setup.exe
          retention-days: 30
          compression-level: 0

  # ── macOS DMG ────────────────────────────────────────────────────────────────
  macos:
    name: macOS DMG
    runs-on: macos-latest
    env:
      APPLE_SIGN: ${{ secrets.APPLE_CERTIFICATE != '' && 'true' || 'false' }}
      APPLE_NOTARIZE: ${{ secrets.APPLE_ID != '' && 'true' || 'false' }}
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: stagesync-server/go.sum

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Import signing certificate
        if: env.APPLE_SIGN == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build Flutter macOS
        run: flutter build macos --release

      - name: Build core library (macOS dylib)
        working-directory: stagesync-server
        env:
          CGO_ENABLED: '1'
        run: |
          APP="../theatre_companion_app/build/macos/Build/Products/Release/StageSync.app"
          go build -buildmode=c-shared -ldflags="-s -w" \
            -o /tmp/libstagesync_core.dylib \
            ./cmd/corelib/
          install_name_tool -id "@executable_path/libstagesync_core.dylib" \
            /tmp/libstagesync_core.dylib
          cp /tmp/libstagesync_core.dylib "$APP/Contents/MacOS/libstagesync_core.dylib"

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VER=$VER" >> "$GITHUB_OUTPUT"

      - name: Sign app bundle
        if: env.APPLE_SIGN == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP="build/macos/Build/Products/Release/StageSync.app"
          find "$APP/Contents/Frameworks" \( -name "*.dylib" -o -name "*.framework" \) \
            -exec codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp {} \;
          codesign --force --sign "$SIGNING_IDENTITY" --options runtime --timestamp \
            "$APP/Contents/MacOS/libstagesync_core.dylib"
          codesign --force --deep --sign "$SIGNING_IDENTITY" --options runtime --timestamp \
            --entitlements macos/Runner/Release.entitlements "$APP"
          codesign --verify --deep --strict "$APP"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VER="${{ steps.version.outputs.VER }}"
          APP="build/macos/Build/Products/Release/StageSync.app"
          DMG="StageSync-${VER}-macos.dmg"
          create-dmg \
            --volname "StageSync ${VER}" \
            --window-pos 200 120 --window-size 600 400 \
            --icon-size 100 \
            --icon "StageSync.app" 175 190 \
            --hide-extension "StageSync.app" \
            --app-drop-link 425 190 \
            "$DMG" "$APP"
          echo "DMG_NAME=$DMG" >> "$GITHUB_ENV"

      - name: Sign DMG
        if: env.APPLE_SIGN == 'true'
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: codesign --sign "$SIGNING_IDENTITY" --timestamp "$DMG_NAME"

      - name: Notarize DMG
        if: env.APPLE_NOTARIZE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait

      - name: Staple notarization
        if: env.APPLE_NOTARIZE == 'true'
        run: xcrun stapler staple "$DMG_NAME"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: theatre_companion_app/${{ env.DMG_NAME }}
          retention-days: 30
          compression-level: 0

  # ── Linux packages (AppImage + .deb + .rpm + tar.gz, x86_64 + aarch64) ────────
  linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            flutter_arch: x64
            deb_arch: amd64
            rpm_arch: x86_64
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: stagesync-server/go.sum

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build libgtk-3-dev libblkid-dev liblzma-dev \
            libstdc++-12-dev cmake clang pkg-config libbluetooth-dev \
            libasound2-dev libfuse2 fuse imagemagick rpm ruby-dev
          sudo gem install fpm --no-document

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Build core library (Linux .so)
        working-directory: stagesync-server
        env:
          CGO_ENABLED: '1'
        run: |
          go build -buildmode=c-shared -ldflags="-s -w" \
            -o ../theatre_companion_app/build/linux/${{ matrix.flutter_arch }}/release/bundle/lib/libstagesync_core.so \
            ./cmd/corelib/

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VER=$VER" >> "$GITHUB_OUTPUT"

      - name: Download appimagetool
        run: |
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage" \
            -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: Prepare AppDir
        run: |
          BUNDLE="build/linux/${{ matrix.flutter_arch }}/release/bundle"
          APPDIR="AppDir"

          mkdir -p \
            "$APPDIR/usr/bin" \
            "$APPDIR/usr/share/applications" \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps"

          cp -r "$BUNDLE/." "$APPDIR/usr/bin/"

          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexport LD_LIBRARY_PATH="$HERE/usr/bin/lib:${LD_LIBRARY_PATH}"\nexec "$HERE/usr/bin/theatre_companion_app" "$@"\n' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          printf '[Desktop Entry]\nName=StageSync\nExec=theatre_companion_app\nIcon=stagesync\nType=Application\nCategories=AudioVideo;Music;\n' \
            > "$APPDIR/stagesync.desktop"
          cp "$APPDIR/stagesync.desktop" "$APPDIR/usr/share/applications/stagesync.desktop"

          ICON_SRC="linux/assets/stagesync.png"
          if [ -f "$ICON_SRC" ]; then
            cp "$ICON_SRC" "$APPDIR/stagesync.png"
          else
            convert -size 256x256 xc:'#1A1A2E' \
              -fill white -gravity Center -font DejaVu-Sans-Bold -pointsize 72 \
              -annotate 0 'SS' "$APPDIR/stagesync.png"
          fi
          cp "$APPDIR/stagesync.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/stagesync.png"

      - name: Build AppImage
        run: |
          VER="${{ steps.version.outputs.VER }}"
          ARCH=${{ matrix.arch }} appimagetool AppDir \
            "StageSync-${VER}-linux-${{ matrix.arch }}.AppImage"

      - name: Build .deb
        run: |
          VER="${{ steps.version.outputs.VER }}"
          BUNDLE="build/linux/${{ matrix.flutter_arch }}/release/bundle"
          printf '#!/bin/bash\nln -sf /opt/stagesync/theatre_companion_app /usr/local/bin/stagesync\n' \
            > /tmp/postinstall.sh
          chmod +x /tmp/postinstall.sh
          fpm -s dir -t deb \
            --name stagesync \
            --version "$VER" \
            --architecture ${{ matrix.deb_arch }} \
            --description "StageSync - Theatre Companion App" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "StageSync Team" \
            --category sound \
            --depends libgtk-3-0 \
            --depends libblkid1 \
            --after-install /tmp/postinstall.sh \
            --prefix /opt/stagesync \
            --package "StageSync-${VER}-linux-${{ matrix.deb_arch }}.deb" \
            "$BUNDLE/=."

      - name: Build .rpm
        run: |
          VER="${{ steps.version.outputs.VER }}"
          BUNDLE="build/linux/${{ matrix.flutter_arch }}/release/bundle"
          # RPM versions cannot contain hyphens — replace with ~
          RPM_VER="${VER//-/\~}"
          fpm -s dir -t rpm \
            --name stagesync \
            --version "$RPM_VER" \
            --architecture ${{ matrix.rpm_arch }} \
            --description "StageSync - Theatre Companion App" \
            --url "https://github.com/${{ github.repository }}" \
            --maintainer "StageSync Team" \
            --category "Applications/Multimedia" \
            --prefix /opt/stagesync \
            --package "StageSync-${VER}-linux-${{ matrix.rpm_arch }}.rpm" \
            "$BUNDLE/=."

      - name: Build tar.gz
        run: |
          VER="${{ steps.version.outputs.VER }}"
          BUNDLE="build/linux/${{ matrix.flutter_arch }}/release/bundle"
          TARNAME="StageSync-${VER}-linux-${{ matrix.arch }}"
          mkdir "$TARNAME"
          cp -r "$BUNDLE/." "$TARNAME/"
          tar -czf "${TARNAME}.tar.gz" "$TARNAME"

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: linux-${{ matrix.arch }}-packages
          path: |
            theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-linux-${{ matrix.arch }}.AppImage
            theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-linux-${{ matrix.deb_arch }}.deb
            theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-linux-${{ matrix.rpm_arch }}.rpm
            theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-linux-${{ matrix.arch }}.tar.gz
          retention-days: 30
          compression-level: 0

  # ── Android APK ─────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          echo "VER=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build APK (release, unsigned)
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             StageSync-${{ steps.version.outputs.VER }}-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-android.apk
          retention-days: 30
          compression-level: 0

  # ── iOS IPA ──────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest
    defaults:
      run:
        working-directory: theatre_companion_app
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          echo "VER=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r StageSync-${{ steps.version.outputs.VER }}-ios.ipa Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: theatre_companion_app/StageSync-${{ steps.version.outputs.VER }}-ios.ipa
          retention-days: 30
          compression-level: 0

  # ── Standalone Server Binaries ───────────────────────────────────────────────
  server:
    name: Server ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            output: stagesync-server-windows-amd64.exe
            cc: ''
            cxx: ''
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            output: stagesync-server-linux-amd64
            cc: gcc
            cxx: g++
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            output: stagesync-server-linux-arm64
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            output: stagesync-server-darwin-amd64
            cc: ''
            cxx: ''
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            output: stagesync-server-darwin-arm64
            cc: ''
            cxx: ''
    defaults:
      run:
        working-directory: stagesync-server
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: stagesync-server/go.sum

      - name: Install Linux deps (amd64)
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: sudo apt-get update -y && sudo apt-get install -y libasound2-dev

      - name: Install Linux deps (arm64 cross-compile)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types: deb/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          CODENAME="$(lsb_release -cs)"
          sudo tee /etc/apt/sources.list.d/arm64-ports.list << EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe multiverse
          EOF
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libasound2-dev:arm64

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          PKG_CONFIG_PATH: ${{ matrix.goarch == 'arm64' && matrix.goos == 'linux' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: go build -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/server/

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output }}
          path: stagesync-server/${{ matrix.output }}
          retention-days: 30
          compression-level: 0

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [windows, macos, linux, android, ios, server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          [ -z "$TAG" ] && TAG="${{ inputs.tag }}"
          VER="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "VER=$VER" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: StageSync ${{ steps.version.outputs.VER }}
          draft: true
          generate_release_notes: true
          files: |
            dist/windows-installer/StageSync-${{ steps.version.outputs.VER }}-windows-x64-setup.exe
            dist/macos-dmg/StageSync-${{ steps.version.outputs.VER }}-macos.dmg
            dist/linux-x86_64-packages/StageSync-${{ steps.version.outputs.VER }}-linux-x86_64.AppImage
            dist/linux-x86_64-packages/StageSync-${{ steps.version.outputs.VER }}-linux-amd64.deb
            dist/linux-x86_64-packages/StageSync-${{ steps.version.outputs.VER }}-linux-x86_64.rpm
            dist/linux-x86_64-packages/StageSync-${{ steps.version.outputs.VER }}-linux-x86_64.tar.gz
            dist/stagesync-server-windows-amd64.exe/stagesync-server-windows-amd64.exe
            dist/stagesync-server-linux-amd64/stagesync-server-linux-amd64
            dist/stagesync-server-linux-arm64/stagesync-server-linux-arm64
            dist/stagesync-server-darwin-amd64/stagesync-server-darwin-amd64
            dist/stagesync-server-darwin-arm64/stagesync-server-darwin-arm64
            dist/android-apk/StageSync-${{ steps.version.outputs.VER }}-android.apk
