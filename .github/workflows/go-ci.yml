name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'stagesync-server/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    paths:
      - 'stagesync-server/**'
      - '.github/workflows/go-ci.yml'

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: stagesync-server

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: stagesync-server/go.mod
          cache-dependency-path: stagesync-server/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: stagesync-server

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: stagesync-server/go.mod
          cache-dependency-path: stagesync-server/go.sum

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y libasound2-dev

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: go-coverage
          path: stagesync-server/coverage.out
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: stagesync-server/go.mod
          cache-dependency-path: stagesync-server/go.sum

      - name: Install system dependencies (amd64)
        if: matrix.goarch == 'amd64'
        run: sudo apt-get update -y && sudo apt-get install -y libasound2-dev

      - name: Install system dependencies (arm64 cross-compile)
        if: matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu libasound2-dev:arm64

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          PKG_CONFIG_PATH: ${{ matrix.goarch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: go build -v -o stagesync-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/server/

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: stagesync-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: stagesync-server/stagesync-server-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 14
