version: 2

updates:
  - package-ecosystem: pub
    directory: /theatre_companion_app
    schedule:
      interval: weekly
      day: monday
    groups:
      flutter-deps:
        patterns: ['*']
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /stagesync-server
    schedule:
      interval: weekly
      day: monday
    groups:
      go-deps:
        patterns: ['*']
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ['*']
    open-pull-requests-limit: 5
