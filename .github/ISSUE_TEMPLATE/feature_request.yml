name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Affected platform(s)
      multiple: true
      options: [Android, iOS, macOS, Windows, Linux, Web, Go Server, All]
