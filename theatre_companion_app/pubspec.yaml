name: theatre_companion_app
description: "StageSync – Theater Companion App with P2P BLE Mesh network stack."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Local Database (Drift / SQLite) ───────────────────────────────────────
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── BLE Mesh Layer ───────────────────────────────────────────────────────
  # bluetooth_low_energy v6.x: CentralManager + PeripheralManager auf allen
  # nativen Plattformen (Android, iOS, Windows, macOS, Linux).
  # Ersetzt flutter_reactive_ble (Central) + ble_peripheral (Peripheral).
  bluetooth_low_energy: ^6.2.1

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^3.3.1

  # ── MIDI (Grid-Controller: lokaler Pfad für APC Mini auf Desktop) ─────────
  flutter_midi_command: ^0.5.4

  # ── Cryptography (AES-256-GCM) ────────────────────────────────────────────
  cryptography: ^2.7.0

  # ── Device Context (Battery, Network, Motion) ─────────────────────────────
  battery_plus: ^7.0.0
  connectivity_plus: ^7.1.1
  sensors_plus: ^7.0.0

  # ── Server Gateway (WebSocket + Socket.IO Cloud Connect) ─────────────────────
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.1.5
  http: ^1.2.0

  # ── QR / Barcode Scanner ─────────────────────────────────────────────────
  # Kamera-basierter Scanner für QR-Codes, EAN, Code128 etc.
  mobile_scanner: ^7.2.0

  # ── Permission Management ─────────────────────────────────────────────────
  # Laufzeit-Berechtigungen für BLE (Android 12+), Standort (Android ≤11) usw.
  permission_handler: ^12.0.3

  # ── Device Info (SDK-Version für permission-Logik, z.B. Android API-Level) ─
  device_info_plus: ^12.4.0

  # ── Gerätepersistenz (DeviceID, einmal generiert und gespeichert) ─────────
  shared_preferences: ^2.3.2

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.5.0
  meta: ^1.16.0
  freezed_annotation: ^3.1.0
  flutter_soloud: ^4.0.7
  grpc: ^5.1.0
  protobuf: ^6.0.0
  fixnum: ^1.1.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  mime: ^2.0.0
  multicast_dns: ^0.3.3
  osc: ^1.0.0
  file_picker: ^11.0.2
  desktop_drop: ^0.7.1
  crypto: ^3.0.0
  ffi: ^2.2.0
  wakelock_plus: ^1.5.2

  # ── Talkback (Mikrofon + Opus-Codec) ─────────────────────────────────────────
  # Mikrofon-Aufnahme: plattformübergreifend, niedrigster Buffer-Modus
  record: ^6.2.1
  # Opus-Codec: Encode (Client→Server) + Decode (für zukünftige Monitor-Feeds)
  opus_flutter: ^3.0.3
  opus_dart: ^3.0.1

# Lokale Patches für Abhängigkeiten mit Build-Problemen
dependency_overrides:
  # record_windows 1.0.7 hat irrtümlich cmake_minimum_required(VERSION 3.23)
  # obwohl der Kommentar direkt darüber sagt "do not increase this version".
  # Diese lokale Kopie enthält den Fix auf 3.14.
  record_windows:
    path: local_packages/record_windows

  # opus_flutter_windows 3.0.0 auf pub.dev fehlt windows/ directory.
  # Diese lokale Kopie enthält den Stub-CMakeLists.txt.
  opus_flutter_windows:
    path: local_packages/opus_flutter_windows

  # flutter_midi_command_linux 0.3.0 verwendet FIEventChannel (umbenannt zu FlEventChannel in Flutter 3.x).
  # Diese lokale Kopie enthält den Fix.
  flutter_midi_command_linux:
    path: local_packages/flutter_midi_command_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Drift code generation
  drift_dev: ^2.28.3
  build_runner: ^2.15.0
  freezed: ^3.2.3
  # Test Utilities
  mocktail: ^1.0.4
  fake_async: ^1.3.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

